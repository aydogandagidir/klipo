<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Scene 01 · Brand Intro · Klipo</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Instrument+Sans:wght@500;600;700&display=swap" />
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@600,700,800,900&display=swap" />
<link rel="stylesheet" href="../style.css" />
<style>
  .s1 {
    background: var(--c-bg);
    color: var(--c-text);
    flex-direction: column;
    text-align: center;
    gap: 18px;
    position: relative;
  }
  /* Soft accent glow behind brand mark */
  .s1__glow {
    position: absolute;
    width: 720px; height: 720px;
    border-radius: 50%;
    filter: blur(140px);
    background: var(--c-accent);
    opacity: 0.10;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: s1Glow 5s ease-in-out infinite;
  }
  @keyframes s1Glow {
    0%, 100% { opacity: 0.10; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 0.14; transform: translate(-50%, -50%) scale(1.05); }
  }

  /* Bluedev wordmark — VISIBLE at frame 0 so the video's poster/first-frame
   * is never blank. A short scale-in still plays (0–.8s) for polish, but the
   * mark is already fully painted in the very first paint pixel, so any
   * player that lifts its thumbnail from t=0 lands on the brand, not white. */
  .s1__bluedev {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 380px;
    height: auto;
    opacity: 1;
    animation: bluedevIn .8s cubic-bezier(.2,.8,.2,1) 0s both,
               bluedevOut .7s ease-in 1.7s both;
  }
  @keyframes bluedevIn {
    /* Starts already at full opacity so frame 0 shows the wordmark; only the
     * scale animates from 0.94 → 1 for a subtle "land" feel. */
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.94); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes bluedevOut {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); filter: blur(6px); }
  }

  /* Klipo lockup fades in after */
  .s1__klipo-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    opacity: 0;
    animation: klipoIn 1s cubic-bezier(.34,1.56,.64,1) 2.4s both;
    position: relative; z-index: 1;
  }
  @keyframes klipoIn {
    0%   { opacity: 0; transform: scale(0.88); }
    100% { opacity: 1; transform: scale(1); }
  }

  .s1__klipo-wordmark {
    /* Proportioned to the 1280-wide frame — never wider than ~25%. */
    width: 320px;
    height: auto;
  }
  .s1__tagline {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.025em;
    color: var(--c-text);
    margin-top: 6px;
    animation: fadeInUp .9s cubic-bezier(.2,.8,.2,1) 3.0s both;
  }
  .s1__by {
    display: flex; align-items: center; gap: 10px;
    margin-top: 6px;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--c-text-3);
    font-weight: 600;
    animation: fadeIn 1s ease-out 3.5s both;
  }
  .s1__by img { height: 22px; width: auto; opacity: 0.9; }
</style>
</head>
<body data-stage="video" data-duration="4500">
  <div class="stage s1">
    <div class="s1__glow"></div>

    <!-- Bluedev wordmark fades in first -->
    <img class="s1__bluedev" src="../brand/bluedev-wordmark-blueTransparent.svg" alt="bluedev" />

    <!-- Klipo lockup follows -->
    <div class="s1__klipo-wrap">
      <img class="s1__klipo-wordmark" src="../../../assets/klipo-wordmark-blueTransparent.svg" alt="Klipo" />
      <div class="s1__tagline">Every Ctrl+C, searchable forever.</div>
      <div class="s1__by">
        <span>a</span>
        <img src="../brand/bluedev-wordmark-blueTransparent.svg" alt="bluedev" />
        <span>product</span>
      </div>
    </div>
  </div>
</body>
</html>
