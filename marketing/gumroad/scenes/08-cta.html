<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Scene 08 · CTA · Klipo</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Instrument+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" />
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@600,700,800;900&display=swap" />
<link rel="stylesheet" href="../style.css" />
<style>
  .s8 {
    background: var(--c-bg);
    color: var(--c-text);
    flex-direction: column;
    text-align: center;
    padding: 56px;
    gap: 24px;
    position: relative;
  }
  .s8__glow-1 {
    position: absolute;
    width: 720px; height: 720px;
    border-radius: 50%;
    filter: blur(160px);
    background: var(--c-accent);
    opacity: 0.10;
    bottom: -300px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }
  .s8__glow-2 {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    filter: blur(140px);
    background: var(--c-accent);
    opacity: 0.06;
    top: -200px; right: -150px;
    pointer-events: none;
  }

  /* Brand lockup — Klipo wordmark + bluedev wordmark side by side */
  .s8__brand-row {
    display: flex; align-items: center; gap: 18px;
    justify-content: center;
    animation: fadeInUp .8s cubic-bezier(.2,.8,.2,1) .1s both;
    position: relative; z-index: 1;
  }
  .s8__klipo {
    height: 80px; width: auto;
  }
  .s8__brand-divider {
    width: 1px;
    height: 36px;
    background: var(--c-border);
  }
  .s8__bluedev-tag {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px;
    color: var(--c-text-3);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .s8__bluedev-tag img { height: 22px; width: auto; opacity: 0.9; }

  .s8__h {
    font-family: var(--font-display);
    font-size: 76px;
    font-weight: 800;
    letter-spacing: -0.045em;
    line-height: 1.0;
    color: var(--c-text);
    animation: fadeInUp 1s cubic-bezier(.2,.8,.2,1) .4s both;
    position: relative; z-index: 1;
  }
  .s8__h .gradient {
    background: var(--gradient-text);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .s8__sub {
    font-size: 22px;
    color: var(--c-text-2);
    font-weight: 400;
    animation: fadeInUp .9s cubic-bezier(.2,.8,.2,1) .8s both;
    max-width: 760px;
    position: relative; z-index: 1;
  }
  .s8__sub strong { color: var(--c-accent); font-weight: 700; }

  .s8__cta {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 22px 48px;
    background: var(--c-accent);
    color: #FFFFFF;
    border-radius: 99px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    box-shadow: 0 24px 60px rgba(1, 90, 255, 0.40);
    animation: fadeInUp .9s cubic-bezier(.34,1.56,.64,1) 1.2s both,
               pulseGlowBlue 2.8s ease-in-out 2.5s infinite;
    margin-top: 4px;
    position: relative; z-index: 1;
  }
  .s8__cta-arrow {
    font-size: 28px;
    animation: drift 1.6s ease-in-out infinite;
  }
  .s8__url {
    font-family: var(--font-mono);
    font-size: 16px;
    padding: 12px 22px;
    background: var(--c-accent-soft);
    color: var(--c-accent);
    border: 1px solid rgba(1, 90, 255, 0.20);
    border-radius: 10px;
    letter-spacing: 0.4px;
    font-weight: 700;
    animation: fadeInUp .8s cubic-bezier(.2,.8,.2,1) 1.6s both;
    box-shadow: 0 14px 32px rgba(1, 90, 255, 0.15);
    position: relative; z-index: 1;
  }
  .s8__guarantees {
    display: flex; gap: 10px; justify-content: center;
    margin-top: 6px;
    animation: fadeInUp .8s cubic-bezier(.2,.8,.2,1) 2s both;
    flex-wrap: wrap;
    position: relative; z-index: 1;
  }
  .s8__guarantees .pill {
    background: var(--c-bg);
    border: 1px solid var(--c-border);
    color: var(--c-text);
    font-weight: 600;
    padding: 8px 16px;
    font-size: 13px;
  }
</style>
</head>
<body data-stage="video" data-duration="6500">
  <div class="stage s8">
    <div class="s8__glow-1"></div>
    <div class="s8__glow-2"></div>

    <div class="s8__brand-row">
      <img class="s8__klipo" src="../../../assets/klipo-wordmark-blueTransparent.svg" alt="Klipo" />
      <div class="s8__brand-divider"></div>
      <div class="s8__bluedev-tag">
        <span>by</span>
        <img src="../brand/bluedev-wordmark-blueTransparent.svg" alt="bluedev" />
      </div>
    </div>

    <div class="s8__h">Try <span class="gradient">free.</span></div>
    <div class="s8__sub"><strong>14 days</strong>, full Pro features, no card. Then $29 lifetime.</div>

    <div class="s8__cta">
      Get Klipo on Gumroad
      <span class="s8__cta-arrow">→</span>
    </div>
    <div class="s8__url">bluedev.dev/products/klipo</div>

    <div class="s8__guarantees">
      <div class="pill">✓ 14-day free trial</div>
      <div class="pill">✓ Lifetime license</div>
      <div class="pill">✓ All v0.x updates</div>
      <div class="pill">✓ Priority support</div>
    </div>
  </div>
</body>
</html>
