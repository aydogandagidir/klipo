# Stable-only rustfmt settings.
# Nightly-only knobs (imports_granularity, group_imports, etc.) are kept out
# so `cargo fmt --check` is reliable on the default stable toolchain.
edition = "2021"
max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
