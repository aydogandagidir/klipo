name: Release (Windows)

# Triggered by:
#   - pushing a `v*` git tag (e.g. `v0.1.0`)        → full release flow
#   - manually from the Actions tab                  → dry-run, artifacts only
#
# Output:
#   - `Klipo_<version>_x64_en-US.msi`               (Windows Installer)
#   - `Klipo_<version>_x64-setup.exe`               (NSIS bootstrapper)
#   - `Klipo_<version>_x64-setup.nsis.zip`          (NSIS payload, for updater)
#   - `Klipo_<version>_x64-setup.nsis.zip.sig`      (Ed25519 signature)
#   - `latest.json`                                  (updater manifest)
#   - GitHub Release with auto-generated notes (tag flow only)
#
# Code-signing (Authenticode/EV cert): not wired yet — `tauri build`
# produces unsigned MSIs. When the project picks up an EV cert, add a
# `signtool sign` step before `tauri-action`'s upload phase.
#
# Tauri-signed updates: `TAURI_SIGNING_PRIVATE_KEY` +
# `TAURI_SIGNING_PRIVATE_KEY_PASSWORD` GitHub Secrets cover the
# auto-update payload signing. `tauri-action`'s `includeUpdaterJson: true`
# generates `latest.json` from the per-bundle `.sig` files and uploads
# it as a release asset, which is what Klipo's `tauri.conf.json`
# `plugins.updater.endpoints` URL points to.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & package (Windows)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        # Version is read from package.json's `packageManager` field —
        # specifying `version` here too triggers ERR_PNPM_BAD_PM_VERSION
        # in action-setup@v4. Keep `packageManager` as the single source.
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile=false

      - name: Build, sign, package, draft release
        # tauri-action runs `pnpm tauri build` with the signing env vars
        # set, then drafts a GitHub Release on the matching tag and
        # uploads MSI + NSIS bundles. We DO NOT use `includeUpdaterJson`
        # — that branch of the action's filter only sees `.msi`/`.exe`
        # files in `Found artifacts:` and skips the updater payload
        # `.nsis.zip` (+ its `.sig`) entirely, which makes manifest
        # generation fail with "Signature not found... Skipping upload".
        # The dedicated step below handles the manifest correctly.
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Klipo ${{ github.ref_name }}"
          releaseBody: |
            ## What's new

            See [`CHANGELOG.md`](https://github.com/aydogandagidir/klipo/blob/${{ github.ref_name }}/CHANGELOG.md) for the full change list.

            ## Install

            - **Windows 10/11** — download `Klipo_*_x64-setup.exe` (NSIS, recommended) or `Klipo_*_x64_en-US.msi`.
            - WebView2 runtime is required (preinstalled on Windows 11; install [Evergreen Bootstrapper](https://developer.microsoft.com/microsoft-edge/webview2/) for Windows 10).
            - SmartScreen will show "Unknown publisher" until an EV cert is provisioned — click "More info" → "Run anyway".

            ## Auto-update

            Existing v0.1.x users will see this release as available via Settings → General → Updates → "Check for updates". Click "Download and install" to upgrade in place.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: false

      - name: Generate + upload updater manifest (latest.json)
        # In Tauri 2.x with `bundle.createUpdaterArtifacts: true`, the build
        # signs the installer files directly:
        #   bundle/nsis/Klipo_<v>_x64-setup.exe        ← user-facing installer
        #   bundle/nsis/Klipo_<v>_x64-setup.exe.sig    ← Ed25519 sig of the .exe
        # No separate `.nsis.zip` payload archive is produced anymore (Tauri 1.x
        # path). The updater plugin reads `latest.json`, downloads the .exe URL,
        # verifies its bytes against the signature in the manifest, runs it
        # silently to upgrade.
        #
        # tauri-action already uploaded `.exe` + `.exe.sig` in the prior step.
        # All this step needs to do is read the .sig content, build the
        # manifest, and upload `latest.json` to the same draft release.
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $installerName = "Klipo_${version}_x64-setup.exe"
          $installerPath = Join-Path $bundleDir $installerName
          $sigPath = Join-Path $bundleDir "${installerName}.sig"

          if (-not (Test-Path $installerPath)) {
            Get-ChildItem $bundleDir
            throw "expected $installerPath to exist after tauri build"
          }
          if (-not (Test-Path $sigPath)) {
            Get-ChildItem $bundleDir
            throw "expected $sigPath to exist after tauri build (is bundle.createUpdaterArtifacts = true in tauri.conf.json?)"
          }

          $sig = (Get-Content $sigPath -Raw).Trim()
          $installerUrl = "https://github.com/${env:GITHUB_REPOSITORY}/releases/download/${tag}/${installerName}"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          # Order matters for Tauri's deserialiser; use [ordered] hashtables.
          $manifest = [ordered]@{
            version = $version
            notes = "Klipo ${tag}. Full release notes: https://github.com/${env:GITHUB_REPOSITORY}/releases/tag/${tag}"
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url = $installerUrl
              }
            }
          }
          $manifestJson = $manifest | ConvertTo-Json -Depth 6
          Write-Host "Generated latest.json:"
          Write-Host $manifestJson
          Set-Content -Path "latest.json" -Value $manifestJson -Encoding utf8

          Write-Host "Uploading latest.json to release ${tag}..."
          gh release upload "$tag" "latest.json" --clobber
