name: Release (Windows)

# Triggered by:
#   - pushing a `v*` git tag (e.g. `v0.1.0`)        → full release flow
#   - manually from the Actions tab                  → dry-run, artifacts only
#
# Output:
#   - `Klipo_<version>_x64_en-US.msi`               (Windows Installer)
#   - `Klipo_<version>_x64-setup.exe`               (NSIS bootstrapper)
#   - GitHub Release with auto-generated notes (tag flow only)
#
# Code-signing: not wired yet — `pnpm tauri build` produces unsigned MSIs.
# When the project picks up an EV cert, add a `signtool sign` step before
# the release upload and store the cert in the `WINDOWS_CERT_BASE64` /
# `WINDOWS_CERT_PASSWORD` repo secrets.
#
# Tauri-signed updates: the `TAURI_PRIVATE_KEY` / `TAURI_KEY_PASSWORD`
# secrets cover the auto-update payload signing once the updater plugin
# is re-enabled (Cargo.toml comment in `src-tauri/Cargo.toml`).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & package (Windows)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        # Version is read from package.json's `packageManager` field —
        # specifying `version` here too triggers ERR_PNPM_BAD_PM_VERSION
        # in action-setup@v4. Keep `packageManager` as the single source.
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile=false

      - name: Build & bundle
        env:
          # Optional — Tauri bundles unsigned if these are not set, which is
          # what we want until an EV cert arrives. CI surfaces a warning
          # inside `tauri build` instead of failing.
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Collect artifacts
        id: collect
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path src-tauri/target/release/bundle/msi -Filter *.msi | Select-Object -First 1
          $exe = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe | Select-Object -First 1
          if (-not $msi) { throw "no MSI produced" }
          if (-not $exe) { throw "no NSIS installer produced" }
          "msi=$($msi.FullName)"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "exe=$($exe.FullName)"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "msi_name=$($msi.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "exe_name=$($exe.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: klipo-windows-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Klipo ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ${{ steps.collect.outputs.msi }}
            ${{ steps.collect.outputs.exe }}
