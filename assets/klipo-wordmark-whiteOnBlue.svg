<?xml version="1.0" encoding="UTF-8"?>
<!--
  Klipo wordmark — Bluedev-whiteOnBlue parallel.
  Brand-accent background, white mark + wordmark.
  Same 500×500 viewBox and positioning as the blue-on-white variant.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="500" height="500" viewBox="0 0 500 500"
     role="img" aria-label="Klipo">
  <title>Klipo</title>
  <rect width="500" height="500" fill="#015AFF"/>

  <g transform="translate(96, 200) scale(1.6)" stroke="#FFFFFF"
     stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="18" y="0" width="20" height="10" rx="3" fill="#FFFFFF" stroke="none"/>
    <rect x="2" y="6" width="52" height="74" rx="6"/>
    <path d="M16 26 L16 66"/>
    <path d="M16 46 L40 26"/>
    <path d="M16 46 L40 66"/>
  </g>

  <text x="220" y="305"
        font-family="Instrument Sans, Inter, system-ui, sans-serif"
        font-size="92" font-weight="800" fill="#FFFFFF"
        letter-spacing="-2.5">Klipo</text>
</svg>
