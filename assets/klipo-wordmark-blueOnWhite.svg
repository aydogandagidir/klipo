<?xml version="1.0" encoding="UTF-8"?>
<!--
  Klipo wordmark — Bluedev-blueOnWhite parallel.
  White background, accent-blue mark + wordmark. 500×500 viewBox to
  match BLUE_wordmark_blueOnWhite_500.svg sizing so the two wordmarks
  feel like siblings in any composition.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="500" height="500" viewBox="0 0 500 500"
     role="img" aria-label="Klipo">
  <title>Klipo</title>
  <rect width="500" height="500" fill="#FFFFFF"/>

  <!-- Mark, scaled and positioned to sit visually-centered with wordmark -->
  <g transform="translate(96, 200) scale(1.6)" stroke="#015AFF"
     stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="18" y="0" width="20" height="10" rx="3" fill="#015AFF" stroke="none"/>
    <rect x="2" y="6" width="52" height="74" rx="6"/>
    <path d="M16 26 L16 66"/>
    <path d="M16 46 L40 26"/>
    <path d="M16 46 L40 66"/>
  </g>

  <!-- Wordmark "Klipo" — Instrument Sans / Inter fallback, tight letter-spacing -->
  <text x="220" y="305"
        font-family="Instrument Sans, Inter, system-ui, sans-serif"
        font-size="92" font-weight="800" fill="#015AFF"
        letter-spacing="-2.5">Klipo</text>
</svg>
